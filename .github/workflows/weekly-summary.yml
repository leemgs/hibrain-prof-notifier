name: Weekly Academic Hiring Summary

on:
  schedule:
    # 매주 토요일 KST 09:00 실행 (UTC 토요일 00:00)
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write   # 요약 JSON 커밋/푸시
  issues: read      # 알림 Issue 조회

# 동시에 두 개 이상 실행되어 push가 충돌하는 것을 방지
concurrency:
  group: weekly-summary
  cancel-in-progress: false

jobs:
  build-summary:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly summary script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python weekly_summary.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/university_hiring_status.json

          # 변경 사항이 없으면 커밋/푸시를 건너뜀
          if git diff --cached --quiet; then
            echo "No changes detected in university_hiring_status.json. Skipping commit."
            exit 0
          fi

          git commit -m "chore: Update weekly hiring status [skip ci]"

          # self-hosted 작업공간이 원격보다 뒤처져 있을 수 있으므로
          # rebase로 최신 상태를 반영한 뒤 push (non-fast-forward 방지)
          git pull --rebase --autostash origin main
          git push origin main
